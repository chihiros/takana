<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI-DLC Planning Chat</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./public/env.js" defer></script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <header class="topbar">
      <h1>AI-DLC Planning</h1>
      <div class="spacer"></div>
      <button id="settingsBtn">Settings</button>
    </header>
    <main class="layout">
      <section class="left">
        <div class="room-controls">
          <input id="roomId" placeholder="room id (e.g., planning)" />
          <input id="roomPassword" placeholder="room password (optional)" type="password" />
          <button id="joinRoom">Join Room</button>
          <span id="roomStatus" class="status"></span>
        </div>
        <div id="presence"></div>
        <div id="chat" class="chat"></div>
        <form id="composer" class="composer">
          <input id="messageInput" placeholder="Message..." autocomplete="off" />
          <button id="sendBtn" type="submit">Send</button>
          <button id="askAiBtn" type="button">Ask AI</button>
        </form>
      </section>
      <section class="right">
        <canvas id="cursorCanvas"></canvas>
      </section>
    </main>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings">
        <h2>Settings</h2>
        <fieldset>
          <legend>Profile</legend>
          <input id="displayName" placeholder="Display name" />
          <input id="color" type="color" />
        </fieldset>
        <fieldset>
          <legend>AI</legend>
          <input id="aiApiKey" type="password" placeholder="OpenAI API Key (optional)" autocomplete="off" />
          <input id="aiProxyUrl" type="url" placeholder="AI Proxy URL (https://... or mock:)" />
          <input id="aiModel" placeholder="Model (e.g., gpt-4o-mini)" />
        </fieldset>
        <menu>
          <button id="resetSettings" value="reset" type="button">Reset</button>
          <button value="cancel">Cancel</button>
          <button id="saveSettings" value="default">Save</button>
        </menu>
      </form>
    </dialog>
  </body>
  </html>
